<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <title>Title</title>
</head>
<body>
<h2>Урок 2: Координатные плоскости и октанты</h2>
<p>Три плоскости XY, XZ, YZ разделяют пространство на 8 октантов. Меняй размеры и смотри как меняются октанты.</p>

<div class="figure">
  <a-scene embedded>
    <!-- Группа всех плоскостей -->
    <a-entity id="planes">
      <!-- Плоскость XY (зеленая, горизонтальная) -->
      <a-plane position="0 0 0" rotation="-90 0 0"
               width="4" height="4"
               color="limegreen"
               opacity="0.4"
               material="transparent: true; opacity: 0.4"></a-plane>

      <!-- Плоскость XZ (красная, вертикальная) -->
      <a-plane position="0 0 0" rotation="0 0 0"
               width="4" height="4"
               color="red"
               opacity="0.4"
               material="transparent: true; opacity: 0.4"></a-plane>

      <!-- Плоскость YZ (синяя, вертикальная) -->
      <a-plane position="0 0 0" rotation="0 90 0"
               width="4" height="4"
               color="skyblue"
               opacity="0.4"
               material="transparent: true; opacity: 0.4"></a-plane>

      <!-- Точки октантов (цветные шарики для наглядности) -->
      <a-sphere position="2 2 2" radius="0.1" color="#ff4444" material="opacity: 0.8"></a-sphere>
      <a-sphere position="-2 2 2" radius="0.1" color="#44ff44" material="opacity: 0.8"></a-sphere>
      <a-sphere position="2 -2 2" radius="0.1" color="#4444ff" material="opacity: 0.8"></a-sphere>
      <a-sphere position="-2 -2 2" radius="0.1" color="#ff44ff" material="opacity: 0.8"></a-sphere>
      <a-sphere position="2 2 -2" radius="0.1" color="#44ffff" material="opacity: 0.8"></a-sphere>
      <a-sphere position="-2 2 -2" radius="0.1" color="#ffaa44" material="opacity: 0.8"></a-sphere>
      <a-sphere position="2 -2 -2" radius="0.1" color="#aa44ff" material="opacity: 0.8"></a-sphere>
      <a-sphere position="-2 -2 -2" radius="0.1" color="#44ffaa" material="opacity: 0.8"></a-sphere>
    </a-entity>

    <a-camera position="5 3 5" look-controls></a-camera>
  </a-scene>

  <!-- Контролы -->
  <div class="controls">
    <label>Размер X: <input type="range" id="sizeX" min="1" max="8" value="4" step="0.5"></label>
    <label>Размер Y: <input type="range" id="sizeY" min="1" max="8" value="4" step="0.5"></label>
    <label>Размер Z: <input type="range" id="sizeZ" min="1" max="8" value="4" step="0.5"></label>
  </div>
</div>

<p><strong>Октанты:</strong> 8 цветных точек показывают углы всех октантов. Полупрозрачные плоскости — XY(зеленая), XZ(красная), YZ(синяя).</p>

</body>
</html>
