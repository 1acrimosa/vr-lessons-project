<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Layout Example</title>
      <link rel="stylesheet" href="styles.css">
      <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
<header>
      <h1>Лого. Название. Цитаты. Селекторы</h1>
</header>

<div class="main-container">
      <aside>
            <h2>Уроки</h2>
            <ul id="lessons-list">
                  <!-- Меню генерируется JS -->
            </ul>
      </aside>
      <main id="main-content">
            <h2>Content</h2>
            <p>Main content here. Add more content to see it expand.</p>

            <!-- Контент урока загружается сюда -->
            <div class="welcome">
                  <h2>Выберите урок</h2>
                  <p>Кликните на урок в сайдбаре</p>
            </div>

      </main>
</div>

<footer>
      <p>© 2026 3D Lessons</p>
</footer>

<script src="app.js"></script>

</body>
</html>
