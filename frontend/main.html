<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Layout Example</title>
      <link rel="stylesheet" href="styles.css">
      <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
<header>
      <h1>Лого. Название. Цитаты. Селекторы</h1>
</header>

<div class="main-container">
      <aside>
            <h2>Уроки</h2>
            <p>Пирамида</p>
      </aside>
      <main>
            <h2>Content</h2>
            <p>Main content here. Add more content to see it expand.</p>

            <div class="figure">
                  <a-scene embedded>
                        <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
                  </a-scene>
            </div>
      </main>
</div>

<footer>
      <p>Контакты</p>
</footer>
</body>
</html>
